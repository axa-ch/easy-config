name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        name: Checkout code
      - name: Install node
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
      - run: npm i -D prettier
        name: Install prettier
      - run: npm run check-formatting
        name: Check formatting
      - run: npm test
        name: Run tests
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        name: Checkout code
      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: latest
      - name: Run Biome
        run: biome ci .
